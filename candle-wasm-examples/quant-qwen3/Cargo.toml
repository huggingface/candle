[package]
name = "candle-wasm-example-quant-qwen3"
version.workspace = true
edition.workspace = true
description.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []
#simd-flash-attn = ["candle-nn/simd-flash-attn", "candle-transformers/simd-flash-attn"]

[dependencies]
# wasm-threads: route the quantized matmul through rayon (backed by
# wasm-bindgen-rayon). Requires the worker pool to be initialized before inference.
candle = { workspace = true, features = ["wasm-threads"] }
candle-nn = { workspace = true }
candle-transformers = { workspace = true} #, features = ["simd-flash-attn"] }
tokenizers = { workspace = true, features = ["unstable_wasm"] }
num-traits = { workspace = true }

# Shared chat template support
candle-wasm-chat-template = { path = "../chat-template", version = "0.1.0" }

# App crates.
anyhow = { workspace = true }
byteorder = { workspace = true }
getrandom = { version = "0.3", features = ["wasm_js"], default-features = false }
image = { workspace = true }
log = { workspace = true }
safetensors = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
rayon = { workspace = true }
# no-bundler: worker glue loads via URL so the built pkg/ works on a plain static
# host; the default bundler import resolves to /pkg/ and is rejected as a module.
wasm-bindgen-rayon = { version = "1.2", features = ["no-bundler"] }
tracing = { workspace = true }
libc = "0.2"

# Wasm specific crates.
console_error_panic_hook = "0.1.7"
wasm-bindgen = "0.2.87"
js-sys = "0.3.64"
web-sys = { version = "0.3.70", features = ["console", "Window", "Performance"] }
